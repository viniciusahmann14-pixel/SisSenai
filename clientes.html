<!DOCTYPE html> 
<html lang="pt-br"> 
<head> 
    <meta charset="UTF-8"> 
    <link rel="stylesheet" href="estilo.css"> 
    <title>SisSenai - Cadastro de Clientes</title> 
</head> 
<body> 
    <nav> 
        <a href="index.html">Home</a> 
        <a href="clientes.html">Clientes</a> 
        <a href="produtos.html">Produtos</a> 
        <a href="vendas.html">Vendas</a> 
        <a href="consulta_vendas.html">Consulta Vendas</a> 
    </nav> 
    
    <header class="banner"> 
        <h1>Gestão de Clientes</h1> 
        <p>Cadastre e gerencie sua base de contatos</p> 
    </header> 
    
    <div class="container"> 
        <div class="card"> 
            <h2>Novo Cadastro</h2> 
            <form action="/salvar-cliente" method="POST"> 
                <input type="text" name="nome" placeholder="Nome do Cliente" required> 
                <input type="text" name="cpf" placeholder="CPF/CNPJ" required> 
                <input type="tel" name="telefone" placeholder="Telefone" required> 
                <button type="submit">Salvar Cliente</button> 
            </form> 
        </div> 
        
        <div class="card" style="margin-top: 20px;"> 
            <h2>Clientes Cadastrados</h2> 
            <table> 
                <thead> 
                    <tr> 
                        <th>Nome</th> 
                        <th>CPF/CNPJ</th> 
                        <th>Telefone</th> 
                        <th>Ações</th><!--Coluna de Ações adicionada -->
                    </tr> 
                </thead> 
                <tbody id="lista-clientes"> 
                    <!-- Os clientes serão inseridos aqui via JavaScript -->
                </tbody> 
            </table> 
        </div> 
    </div> 

    <script> 
       //Função para carregagr os clientes e desenhar os botões de ação 
    function carregarClientes(){
        fetch('/listar-clientes') 
            .then(res => res.json()) 
            .then(clientes => { 
                const corpoTabela = document.getElementById('lista-clientes'); 
                clientes.forEach(c => { 
                    corpoTabela.innerHTML += `
                        <tr> 
                            <td>${c.nome}</td> 
                            <td>${c.cpf}</td> 
                            <td>${c.telefone}</td>
                            <td>
                                <button onclick="prepararEdicao(${c.id}, '${c.nome}', '${c.cpf}', '${c.telefone}')" style="width:auto; background:orange; padding:5px 10px; margin-right:5px;">✏️</button>
                            <button onclick="excluirCliente(${c.id})"
                                style="width.auto; background:red; padding:5px 10px;">🗑️</button>
                            </td>
                        </tr>`; 
                }); 
            }); 
    }

    //Lógica para Salvar (Nova ou Edição)
    document.getElementByld('form-cliente').onsubmit = function(e){
        e.preventDefault();
        const id = this.dataset.id;//Verifica se há um ID guardado para edição
        const dados = {
            nome:this.nome.value,
            cpf: this.cpf.value,
            telefone: this.telefone.value
        };
        const url = id ?`/alterar-cliente+${id}`:'/salvar-cliente';
        const metodo = id ? 'PUT':'POST';

        fetch(url,{
            method:metodo,
            headers:{'Contebt-Type':'application/json'");
    </script> 

    <footer class="rodape"> 
        <div class="container-rodape"> 
            <p>&copy; 2026 SisSenai - Sistema de Gestão Educacional</p> 
            <p>Desenvolvido para fins didáticos - unidade SENAI Capanema/PR</p> 
        </div> 
    </footer> 
</body> 
</html>
